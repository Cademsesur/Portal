name: sesur-flow

services:
  postgres:
    image: postgres:16-alpine
    container_name: sesur_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sesur
      POSTGRES_PASSWORD: sesur
      POSTGRES_DB: sesur_flow
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sesur -d sesur_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sesur_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sesur_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI http://localhost:8025

  minio:
    image: minio/minio:latest
    container_name: sesur_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console http://localhost:9001
    volumes:
      - ./data/minio:/data
